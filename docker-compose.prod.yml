services:
  chroma:
    image: chromadb/chroma:1.5.9
    restart: unless-stopped
    volumes:
      - chroma_data:/data
    ports:
      - "8001:8000"

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      - chroma
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  chroma_data:
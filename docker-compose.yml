services:
  chroma:
    image: chromadb/chroma:1.5.9
    restart: unless-stopped
    volumes:
      - chroma_data:/data
    ports:
      - "8001:8000"

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      - chroma
      - ollama
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  chroma_data:
  ollama_data: